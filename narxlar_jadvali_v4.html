<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Narxlar jadvali</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#1a1a1a}
.container{max-width:960px;margin:0 auto;padding:1rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:10px;background:#fff;padding:1rem 1.25rem;border-radius:12px;border:1px solid #e5e5e5}
.shop-name{font-size:20px;font-weight:700}
.shop-sub{font-size:13px;color:#666;margin-top:2px}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{padding:7px 16px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#555;font-family:Arial}
.tab.active{background:#1a5faa;color:#fff;border-color:#1a5faa}
.tab:hover:not(.active){background:#f0f0f0}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:700;margin-bottom:1rem}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-row input,.form-row select{flex:1;min-width:120px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#1a5faa}
.btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;font-family:Arial}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1a5faa;color:#fff;border-color:#1a5faa}
.btn-primary:hover{background:#164d8c}
.btn-danger{color:#c0392b;border-color:#f5c6c6}
.btn-danger:hover{background:#fdf0f0}
.btn-success{background:#27ae60;color:#fff;border-color:#27ae60}
.btn-success:hover{background:#219150}
.btn-sm{padding:4px 10px;font-size:12px}
table{width:100%;border-collapse:collapse}
th{font-size:12px;font-weight:700;color:#666;text-align:left;padding:9px 10px;border-bottom:1px solid #eee;background:#fafafa}
td{padding:8px 10px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9f9f9}
.brand-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.brands-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.brand-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem;cursor:pointer;transition:border-color 0.15s}
.brand-card:hover{border-color:#aaa}
.qr-wrap{display:flex;justify-content:center;margin-top:8px}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.cat-row td{font-size:11px;font-weight:700;text-transform:uppercase;color:#888;padding:10px 10px 4px;background:#fafafa}
.color-opts{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-opt{width:26px;height:26px;border-radius:6px;cursor:pointer;border:3px solid transparent}
.color-opt.picked{border-color:#1a1a1a}
.editable{cursor:pointer;border-bottom:1px dashed #ccc;padding:1px 3px;border-radius:3px}
.editable:hover{background:#fff8e1;border-color:#f0a500}
.editing{border:1.5px solid #1a5faa!important;border-radius:6px;padding:3px 6px;font-size:13px;font-family:Arial;width:120px;background:#fff;outline:none}
.kurs-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#fff8e1;border:1px solid #f5d76e;border-radius:10px;padding:10px 16px;margin-bottom:1rem}
.kurs-input{width:110px;padding:6px 10px;border:1px solid #f0c030;border-radius:8px;font-size:14px;font-weight:700;font-family:Arial;background:#fff;color:#1a1a1a;text-align:center}

/* LOGIN OVERLAY */
#loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:#fff;border-radius:16px;padding:2rem;width:320px;text-align:center;border:1px solid #e5e5e5}
.login-logo{width:56px;height:56px;border-radius:12px;background:#1a5faa;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;margin:0 auto 1rem}
.login-title{font-size:18px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:1.25rem}
.login-input{width:100%;padding:10px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;font-family:Arial;text-align:center;letter-spacing:2px;margin-bottom:12px}
.login-input:focus{outline:none;border-color:#1a5faa}
.login-btn{width:100%;padding:10px;background:#1a5faa;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:Arial}
.login-btn:hover{background:#164d8c}
.login-err{color:#c0392b;font-size:13px;margin-top:8px;display:none}
.login-attempts{font-size:12px;color:#aaa;margin-top:6px}

/* admin badge */
.admin-badge{display:inline-flex;align-items:center;gap:5px;background:#e8f4fd;border:1px solid #b8d9f5;border-radius:20px;padding:3px 10px;font-size:12px;color:#1a5faa;cursor:pointer}
.admin-badge:hover{background:#d0eafb}

/* brand page */
#brandPage{display:none;min-height:100vh;background:#f5f5f5;padding:1rem}
.bp-header{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px;border:1px solid #e5e5e5}
.bp-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.back-btn{margin-left:auto;padding:7px 14px;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;font-family:Arial}

@media print{
  .no-print{display:none!important}
  .print-only{display:block!important}
  #brandPage{display:none!important}
  #loginOverlay{display:none!important}
  .qr-print-grid{display:grid;grid-template-columns:repeat(3,1fr)}
  .qr-print-card{border:1px dashed #ccc;padding:16px;text-align:center;page-break-inside:avoid}
  .qr-print-name{font-size:15px;font-weight:700;margin-bottom:6px}
  .qr-print-scan{font-size:10px;color:#555;margin-top:6px}
}
.print-only{display:none}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">NJ</div>
    <div class="login-title">Narxlar jadvali</div>
    <div class="login-sub">Tahrirlash uchun parol kiriting</div>
    <input type="password" class="login-input" id="loginInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()" />
    <button class="login-btn" onclick="checkLogin()">Kirish</button>
    <div class="login-err" id="loginErr">Parol noto'g'ri!</div>
    <div class="login-attempts" id="loginAttempts"></div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #f0f0f0">
      <button class="btn" style="font-size:12px;color:#888" onclick="guestMode()">Faqat ko'rish rejimida kiring</button>
    </div>
  </div>
</div>

<!-- BRAND PAGE -->
<div id="brandPage">
  <div style="max-width:700px;margin:0 auto;padding:1rem">
    <div class="bp-header">
      <div class="bp-icon" id="bpIcon"></div>
      <div>
        <div style="font-size:20px;font-weight:700" id="bpTitle"></div>
        <div style="font-size:13px;color:#888;margin-top:2px" id="bpSub"></div>
      </div>
      <button class="back-btn" onclick="closeBrandPage()">← Orqaga</button>
    </div>
    <div style="background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden;margin-bottom:1rem">
      <table>
        <thead><tr>
          <th style="width:28px">#</th>
          <th>Mahsulot</th>
          <th style="text-align:right">Narxi (so'm)</th>
          <th style="text-align:right">USD</th>
        </tr></thead>
        <tbody id="bpBody"></tbody>
      </table>
    </div>
    <div style="text-align:center;font-size:12px;color:#aaa;padding:.5rem" id="bpNote"></div>
  </div>
</div>

<!-- MAIN PANEL -->
<div class="container no-print" id="mainPanel" style="display:none">
<div class="top-bar">
  <div>
    <div class="shop-name" id="shopNameDisplay">Do'kon nomi</div>
    <div class="shop-sub" id="dateLabel"></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabBrandsBtn" onclick="setTab('brands',this)">Brendlar</button>
    <button class="tab" id="tabProductsBtn" onclick="setTab('products',this)">Mahsulotlar</button>
    <button class="tab" onclick="setTab('view',this)">Ko'rinish</button>
    <span id="adminControls" style="display:none;gap:6px;display:none">
      <button class="tab btn-success" onclick="printQR()">QR Chop etish</button>
    </span>
    <span id="modeIndicator"></span>
    <button class="btn btn-sm" style="font-size:12px;color:#888" onclick="logout()">Chiqish</button>
  </div>
</div>

<div id="adminOnly" style="display:none">
<div class="card" style="margin-bottom:.75rem">
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <input type="text" id="shopNameInput" placeholder="Do'kon nomi" style="flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial" oninput="document.getElementById('shopNameDisplay').textContent=this.value||'Do\'kon nomi'" />
  </div>
</div>
<div class="kurs-bar">
  <span style="font-size:13px;font-weight:700;color:#7d5a00">💱 Dollar kursi:</span>
  <span style="font-size:13px;color:#7d5a00">1 USD =</span>
  <input type="number" class="kurs-input" id="usdRate" value="12700" oninput="onKursChange()" />
  <span style="font-size:13px;color:#7d5a00">so'm</span>
  <span style="font-size:12px;color:#a07800" id="kursInfo"></span>
</div>
</div>

<!-- BRANDS TAB -->
<div id="tab-brands">
  <div id="brandAddForm" style="display:none">
    <div class="card">
      <div class="card-title">Yangi brend qo'shish</div>
      <div class="form-row">
        <input type="text" id="b-key" placeholder="Kalit so'z (masalan: samsung)" />
        <input type="text" id="b-name" placeholder="Brend nomi" />
        <input type="text" id="b-letter" placeholder="Belgi (2-3)" maxlength="3" style="max-width:80px" />
      </div>
      <div style="font-size:12px;color:#666;margin-bottom:6px">Rang:</div>
      <div class="color-opts" id="colorOpts"></div>
      <div style="margin-top:10px"><button class="btn btn-primary" onclick="addBrand()">+ Brend qo'shish</button></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Brendlar ro'yxati</div>
    <div id="brandTableWrap"></div>
  </div>
</div>

<!-- PRODUCTS TAB -->
<div id="tab-products" style="display:none">
  <div id="productAddForm" style="display:none">
    <div class="card">
      <div style="background:#e8f4fd;border:1px solid #b8d9f5;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#1a5faa">
        💡 Narxni o'zgartirish uchun jadvalda narx ustiga bosing
      </div>
      <div class="card-title">Mahsulot qo'shish</div>
      <div class="form-row">
        <select id="p-brand"><option value="">— Brend tanlang —</option></select>
        <input type="text" id="p-cat" placeholder="Kategoriya (Klaviatura...)" />
      </div>
      <div class="form-row">
        <input type="text" id="p-name" placeholder="Mahsulot nomi" style="flex:2" />
        <input type="number" id="p-uzs" placeholder="Narxi (so'm)" />
        <input type="number" id="p-usd" placeholder="Narxi (USD)" />
      </div>
      <button class="btn btn-primary" style="margin-top:6px" onclick="addProduct()">+ Mahsulot qo'shish</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Mahsulotlar</div>
      <select id="filterBrand" onchange="renderProductTable()" style="padding:6px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:Arial">
        <option value="">Barcha brendlar</option>
      </select>
    </div>
    <div id="productTableWrap"></div>
  </div>
</div>

<!-- VIEW TAB -->
<div id="tab-view" style="display:none">
  <div class="brands-grid" id="viewGrid"></div>
  <div id="viewDetail" style="display:none"></div>
</div>
</div><!-- /mainPanel -->

<!-- PRINT -->
<div class="print-only">
  <div style="text-align:center;margin-bottom:16px;font-size:18px;font-weight:700" id="printShopName"></div>
  <div style="text-align:center;font-size:12px;color:#888;margin-bottom:16px" id="printDate"></div>
  <div class="qr-print-grid" id="qrPrintGrid"></div>
</div>

<script>
const BASE_URL="https://ibrohimasqarov2292-hub.github.io/Price-List/narxlar_jadvali_v2.html";
const PWD_HASH="388f744d721f92d83a344dd20541a35d35566eee9e5b7fa2f77ea66304b8f1f3";
let isAdmin=false;
let loginAttempts=0;

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkLogin(){
  const val=document.getElementById('loginInput').value;
  const hash=await sha256(val);
  if(hash===PWD_HASH){
    isAdmin=true;
    document.getElementById('loginOverlay').style.display='none';
    document.getElementById('mainPanel').style.display='block';
    enableAdminUI();
  } else {
    loginAttempts++;
    const err=document.getElementById('loginErr');
    err.style.display='block';
    document.getElementById('loginInput').value='';
    document.getElementById('loginInput').style.borderColor='#c0392b';
    setTimeout(()=>{document.getElementById('loginInput').style.borderColor='#ddd';},1000);
    if(loginAttempts>=3){
      document.getElementById('loginAttempts').textContent=loginAttempts+' marta noto\'g\'ri kiritildi';
    }
  }
}

function guestMode(){
  isAdmin=false;
  document.getElementById('loginOverlay').style.display='none';
  document.getElementById('mainPanel').style.display='block';
  enableGuestUI();
}

function enableAdminUI(){
  document.getElementById('adminOnly').style.display='block';
  document.getElementById('brandAddForm').style.display='block';
  document.getElementById('productAddForm').style.display='block';
  document.getElementById('adminControls').style.display='flex';
  document.getElementById('modeIndicator').innerHTML='<span style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:20px;padding:3px 10px;font-size:12px;color:#2e7d32">Admin</span>';
  renderBrandTable();
}

function enableGuestUI(){
  document.getElementById('adminOnly').style.display='none';
  document.getElementById('brandAddForm').style.display='none';
  document.getElementById('productAddForm').style.display='none';
  document.getElementById('adminControls').style.display='none';
  document.getElementById('modeIndicator').innerHTML='<span style="background:#f5f5f5;border:1px solid #ddd;border-radius:20px;padding:3px 10px;font-size:12px;color:#888">Ko\'rish rejimi</span>';
  setTab('view', document.querySelector('.tab'));
  renderViewTab();
}

function logout(){
  isAdmin=false;
  document.getElementById('mainPanel').style.display='none';
  document.getElementById('loginInput').value='';
  document.getElementById('loginErr').style.display='none';
  document.getElementById('loginAttempts').textContent='';
  loginAttempts=0;
  document.getElementById('loginOverlay').style.display='flex';
}

const COLORS=[
  {bg:"#dceefb",text:"#0c447c"},{bg:"#d5f5e3",text:"#1a5c30"},
  {bg:"#fde8d8",text:"#7d3c00"},{bg:"#ede7f6",text:"#4a148c"},
  {bg:"#fce4ec",text:"#880e4f"},{bg:"#e0f7fa",text:"#006064"},
  {bg:"#fff8e1",text:"#f57f17"},{bg:"#f3e5f5",text:"#6a1b9a"},
];
let pickedColor=0;
let brands={
  rapoo:{name:"Rapoo",letter:"RP",color:COLORS[0],products:[
    {cat:"Klaviatura",name:"Rapoo E9100M Wireless",uzs:420000,usd:33},
    {cat:"Klaviatura",name:"Rapoo MT700 Mechanical",uzs:980000,usd:77},
    {cat:"Sichqoncha",name:"Rapoo M20 Silent Wireless",uzs:180000,usd:14},
    {cat:"Sichqoncha",name:"Rapoo VT200 Gaming Mouse",uzs:320000,usd:25},
    {cat:"Qulaqliq",name:"Rapoo VH510 7.1 Gaming",uzs:560000,usd:44},
    {cat:"To'plam",name:"Rapoo 8000M Wireless Combo",uzs:650000,usd:51},
  ]},
  razer:{name:"Razer",letter:"RZ",color:COLORS[1],products:[
    {cat:"Klaviatura",name:"Razer BlackWidow V3",uzs:2850000,usd:225},
    {cat:"Klaviatura",name:"Razer Huntsman Mini",uzs:2400000,usd:189},
    {cat:"Sichqoncha",name:"Razer DeathAdder V3",uzs:1650000,usd:130},
    {cat:"Sichqoncha",name:"Razer Viper V2 Pro Wireless",uzs:3100000,usd:244},
    {cat:"Qulaqliq",name:"Razer BlackShark V2 Pro",uzs:3400000,usd:268},
    {cat:"Gamepad",name:"Razer Wolverine V2 Chroma",uzs:3800000,usd:299},
    {cat:"Sichqoncha gilami",name:"Razer Goliathus Extended XXL",uzs:980000,usd:77},
  ]},
  "2e":{name:"2E Gaming",letter:"2E",color:COLORS[2],products:[
    {cat:"Klaviatura",name:"2E Gaming KG370 RGB Mechanical",uzs:480000,usd:38},
    {cat:"Klaviatura",name:"2E Gaming KG315 TKL",uzs:390000,usd:31},
    {cat:"Sichqoncha",name:"2E Gaming MG330 Wireless",uzs:280000,usd:22},
    {cat:"Sichqoncha",name:"2E Gaming MG350 RGB",uzs:220000,usd:17},
    {cat:"Qulaqliq",name:"2E Gaming HG350 7.1 RGB",uzs:450000,usd:35},
    {cat:"Gamepad",name:"2E Gaming GP45 Wireless",uzs:480000,usd:38},
    {cat:"Sichqoncha gilami",name:"2E Gaming Pad RGB 900x400",uzs:320000,usd:25},
    {cat:"To'plam",name:"2E Gaming MK470 Combo",uzs:580000,usd:46},
  ]},
};

function getRate(){return parseInt(document.getElementById('usdRate').value)||12700;}
function onKursChange(){
  const r=getRate();
  Object.values(brands).forEach(b=>b.products.forEach(p=>{if(p.usd>0)p.uzs=p.usd*r;}));
  document.getElementById('kursInfo').textContent='✓ yangilandi';
  setTimeout(()=>document.getElementById('kursInfo').textContent='',2000);
  renderProductTable();
}

const fmt=n=>n?Math.round(n).toLocaleString('uz-UZ')+" so'm":"—";
const fmtU=n=>n?"$"+n:"—";
document.getElementById('dateLabel').textContent=new Date().toLocaleDateString('uz-UZ',{year:'numeric',month:'long',day:'numeric'});

function checkURLParam(){
  const p=new URLSearchParams(window.location.search);
  const bk=p.get('brand');
  if(bk&&brands[bk]){
    document.getElementById('loginOverlay').style.display='none';
    showBrandPage(bk);
  }
}

function showBrandPage(key){
  const b=brands[key];
  const r=getRate();
  document.getElementById('mainPanel').style.display='none';
  document.getElementById('brandPage').style.display='block';
  const icon=document.getElementById('bpIcon');
  icon.textContent=b.letter; icon.style.background=b.color.bg; icon.style.color=b.color.text;
  document.getElementById('bpTitle').textContent=b.name;
  document.getElementById('bpSub').textContent=b.products.length+' ta mahsulot';
  document.getElementById('bpNote').textContent='Narxlar taxminiy · 1 USD = '+r.toLocaleString('uz-UZ')+' so\'m';
  const cats=[...new Set(b.products.map(p=>p.cat))];
  let rows='';
  cats.forEach(cat=>{
    rows+=`<tr><td colspan="4" style="font-size:11px;font-weight:700;text-transform:uppercase;color:#888;padding:10px 10px 4px;background:#fafafa;border-bottom:1px solid #f0f0f0">${cat}</td></tr>`;
    b.products.filter(p=>p.cat===cat).forEach((p,i)=>{
      const uzs=p.usd>0?p.usd*r:p.uzs;
      rows+=`<tr>
        <td style="color:#aaa;font-size:12px">${i+1}</td>
        <td style="font-size:14px">${p.name}</td>
        <td style="text-align:right;font-weight:700;font-size:14px">${fmt(uzs)}</td>
        <td style="text-align:right;color:#888;font-size:13px">${fmtU(p.usd)}</td>
      </tr>`;
    });
  });
  document.getElementById('bpBody').innerHTML=rows;
}

function closeBrandPage(){
  document.getElementById('brandPage').style.display='none';
  if(isAdmin){document.getElementById('mainPanel').style.display='block';}
  else{document.getElementById('loginOverlay').style.display='flex';}
  history.pushState({},'',window.location.pathname);
}

function setTab(t,btn){
  ['brands','products','view'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'':'none');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(t==='products')renderProductTab();
  if(t==='view')renderViewTab();
}

function buildColorOpts(){
  const el=document.getElementById('colorOpts');
  if(!el)return;
  el.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='color-opt'+(i===pickedColor?' picked':'');
    d.style.background=c.bg;
    d.onclick=()=>{pickedColor=i;buildColorOpts();};
    el.appendChild(d);
  });
}
buildColorOpts();

function addBrand(){
  const key=document.getElementById('b-key').value.trim().toLowerCase().replace(/\s+/g,'');
  const name=document.getElementById('b-name').value.trim();
  const letter=document.getElementById('b-letter').value.trim().toUpperCase();
  if(!key||!name||!letter){alert("Barcha maydonlarni to'ldiring");return;}
  if(brands[key]){alert("Bu kalit so'z allaqachon mavjud");return;}
  brands[key]={name,letter,color:COLORS[pickedColor],products:[]};
  document.getElementById('b-key').value='';
  document.getElementById('b-name').value='';
  document.getElementById('b-letter').value='';
  renderBrandTable();
}

function deleteBrand(key){
  if(!isAdmin)return;
  if(!confirm(brands[key].name+" brendini o'chirasizmi?"))return;
  delete brands[key];
  renderBrandTable();
}

function renderBrandTable(){
  const wrap=document.getElementById('brandTableWrap');
  if(!wrap)return;
  const keys=Object.keys(brands);
  if(!keys.length){wrap.innerHTML='<div class="empty">Hali brend qo\'shilmagan</div>';return;}
  let h='<table><thead><tr><th>Brend</th><th>QR kalit</th><th>Mahsulotlar</th>'+(isAdmin?'<th></th>':'')+'</tr></thead><tbody>';
  keys.forEach(k=>{
    const b=brands[k];
    h+=`<tr>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="brand-icon" style="background:${b.color.bg};color:${b.color.text}">${b.letter}</div>
        <span>${b.name}</span></div></td>
      <td><code style="font-size:11px;color:#666">?brand=${k}</code></td>
      <td>${b.products.length} ta</td>
      ${isAdmin?`<td><button class="btn btn-sm btn-danger" onclick="deleteBrand('${k}')">O'chirish</button></td>`:''}
    </tr>`;
  });
  wrap.innerHTML=h+'</tbody></table>';
}

function makeEditable(el,bk,idx,field){
  if(!isAdmin)return;
  const cur=brands[bk].products[idx][field];
  const input=document.createElement('input');
  input.type='number'; input.value=cur; input.className='editing';
  el.replaceWith(input);
  input.focus(); input.select();
  function save(){
    const val=parseInt(input.value)||0;
    brands[bk].products[idx][field]=val;
    if(field==='usd'&&val>0)brands[bk].products[idx].uzs=val*getRate();
    if(field==='uzs')brands[bk].products[idx].usd=0;
    renderProductTable();
  }
  input.onblur=save;
  input.onkeydown=e=>{if(e.key==='Enter')save();};
}

function renderProductTab(){
  const sel=document.getElementById('p-brand');
  const fsel=document.getElementById('filterBrand');
  if(!sel||!fsel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">— Brend tanlang —</option>';
  fsel.innerHTML='<option value="">Barcha brendlar</option>';
  Object.entries(brands).forEach(([k,b])=>{
    sel.innerHTML+=`<option value="${k}">${b.name}</option>`;
    fsel.innerHTML+=`<option value="${k}">${b.name}</option>`;
  });
  sel.value=cur;
  renderProductTable();
}

function addProduct(){
  if(!isAdmin)return;
  const bk=document.getElementById('p-brand').value;
  const cat=document.getElementById('p-cat').value.trim();
  const name=document.getElementById('p-name').value.trim();
  const uzs=parseInt(document.getElementById('p-uzs').value)||0;
  const usd=parseInt(document.getElementById('p-usd').value)||0;
  if(!bk||!cat||!name){alert("Brend, kategoriya va nom majburiy");return;}
  const finalUzs=usd>0?usd*getRate():uzs;
  brands[bk].products.push({cat,name,uzs:finalUzs,usd});
  document.getElementById('p-name').value='';
  document.getElementById('p-uzs').value='';
  document.getElementById('p-usd').value='';
  renderProductTable();
  renderBrandTable();
}

function deleteProduct(bk,idx){
  if(!isAdmin)return;
  brands[bk].products.splice(idx,1);
  renderProductTable();
  renderBrandTable();
}

function renderProductTable(){
  const wrap=document.getElementById('productTableWrap');
  if(!wrap)return;
  const filter=document.getElementById('filterBrand')?.value||'';
  const keys=filter?[filter]:Object.keys(brands);
  const r=getRate();
  let rows='';
  keys.forEach(k=>{
    const b=brands[k];
    b.products.forEach((p,i)=>{
      const uzs=p.usd>0?p.usd*r:p.uzs;
      const uzsCell=isAdmin
        ?`<span class="editable" onclick="makeEditable(this,'${k}',${i},'uzs')">${Math.round(uzs).toLocaleString('uz-UZ')} so'm</span>`
        :`${Math.round(uzs).toLocaleString('uz-UZ')} so'm`;
      const usdCell=isAdmin
        ?`<span class="editable" onclick="makeEditable(this,'${k}',${i},'usd')">${p.usd?'$'+p.usd:'—'}</span>`
        :`${p.usd?'$'+p.usd:'—'}`;
      rows+=`<tr>
        <td><div style="display:flex;align-items:center;gap:6px">
          <div class="brand-icon" style="width:24px;height:24px;font-size:10px;background:${b.color.bg};color:${b.color.text}">${b.letter}</div>
          <span style="font-size:12px;color:#666">${b.name}</span></div></td>
        <td><span style="background:#f0f0f0;padding:2px 8px;border-radius:20px;font-size:11px">${p.cat}</span></td>
        <td>${p.name}</td>
        <td style="font-weight:700">${uzsCell}</td>
        <td style="color:#666">${usdCell}</td>
        ${isAdmin?`<td><button class="btn btn-sm btn-danger" onclick="deleteProduct('${k}',${i})">O'ch</button></td>`:''}
      </tr>`;
    });
  });
  if(!rows){wrap.innerHTML='<div class="empty">Mahsulot yo\'q</div>';return;}
  const editHint=isAdmin?' <span style="font-size:12px;color:#27ae60;font-weight:400">— narxni o\'zgartirish uchun bosing</span>':'';
  wrap.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>Brend</th><th>Kat.</th><th>Nomi</th><th>So'm${editHint}</th><th>USD</th>${isAdmin?'<th></th>':''}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

function renderViewTab(){
  const grid=document.getElementById('viewGrid');
  const detail=document.getElementById('viewDetail');
  if(!grid)return;
  detail.style.display='none'; grid.style.display='grid'; grid.innerHTML='';
  Object.entries(brands).forEach(([key,b])=>{
    const qrUrl=BASE_URL+'?brand='+key;
    const div=document.createElement('div');
    div.className='brand-card';
    div.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="brand-icon" style="background:${b.color.bg};color:${b.color.text}">${b.letter}</div>
        <div>
          <div style="font-size:14px;font-weight:700">${b.name}</div>
          <div style="font-size:12px;color:#888">${b.products.length} ta mahsulot</div>
        </div>
      </div>
      <div class="qr-wrap" id="vqr-${key}"></div>
      <div style="text-align:center;font-size:11px;color:#aaa;margin-top:4px">Skanerlab ko'ring</div>`;
    div.onclick=()=>showBrandPage(key);
    grid.appendChild(div);
    setTimeout(()=>{
      try{new QRCode(document.getElementById('vqr-'+key),{text:qrUrl,width:100,height:100,colorDark:"#1a1a1a",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});}catch(e){}
    },100);
  });
}

function printQR(){
  if(!isAdmin)return;
  const shopName=document.getElementById('shopNameInput').value||"Do'kon";
  document.getElementById('printShopName').textContent=shopName+" — QR Kodlar";
  document.getElementById('printDate').textContent=new Date().toLocaleDateString('uz-UZ',{year:'numeric',month:'long',day:'numeric'});
  const grid=document.getElementById('qrPrintGrid');
  grid.innerHTML='';
  const keys=Object.keys(brands);
  let done=0;
  keys.forEach((key,idx)=>{
    const b=brands[key];
    const qrUrl=BASE_URL+'?brand='+key;
    const div=document.createElement('div');
    div.className='qr-print-card';
    div.innerHTML=`
      <div class="qr-print-name">${b.name}</div>
      <div id="pqr-${key}" style="display:flex;justify-content:center;margin:8px 0"></div>
      <div class="qr-print-scan">Skanerlab narxlarni ko'ring</div>`;
    grid.appendChild(div);
    setTimeout(()=>{
      try{
        new QRCode(document.getElementById('pqr-'+key),{text:qrUrl,width:140,height:140,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M});
        done++; if(done===keys.length)setTimeout(()=>window.print(),400);
      }catch(e){done++;if(done===keys.length)setTimeout(()=>window.print(),400);}
    },200+idx*120);
  });
}

checkURLParam();
</script>
